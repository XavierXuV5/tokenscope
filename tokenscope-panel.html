<html lang="en">

<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
  .stage { display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; align-items: flex-start; padding: 40px 24px 80px; }
  .board { width: 372px; border-radius: 16px; overflow: hidden; box-shadow: 0 24px 70px rgba(40,50,45,0.22); }
  .board-label { font: 600 12px 'IBM Plex Sans', system-ui, sans-serif; color: rgba(20,24,22,0.55); letter-spacing: .02em; margin: 0 0 12px 2px; }
  .col { display: flex; flex-direction: column; }
</style>

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useId, useRef } = React;

// =====================================================================
// DATA — mirrors the live app (heavily cached usage; per-model/MCP/Skill).
// Deltas are real percentages (e.g. -47 = down 47%). Series points carry
// input / cache / output plus a `full` label for the hover tooltip.
// =====================================================================
const WD = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// split a per-bucket total (M tokens) into uncached input / cache / output,
// reflecting that replayed context (cache) dominates real usage.
function pt(label, full, total) {
  if (total <= 0) return { label, full, input: 0, cache: 0, output: 0 };
  const output = +(total * 0.006).toFixed(3);
  const input = +(total * 0.007).toFixed(3);
  const cache = +(total - output - input).toFixed(3);
  return { label, full, input, cache, output };
}

const WEEK = [0, 2.0, 1.1, 0.7, 56.0, 84.0, 161.1].map((tot, i) =>
  pt(WD[i], `${WD[i]} Jun ${i + 1}`, tot));

const DAY = (() => {
  const shape = [0,0,0,0,0,0,0,0,0,3.9,8.2,14.1,9.0,5.4,7.1,18.3,22.4,11.8,9.4,6.1,4.2,2.1,0,0];
  return shape.map((tot, h) =>
    pt(h % 6 === 0 ? String(h).padStart(2, '0') : '', `${String(h).padStart(2, '0')}:00`, tot));
})();

const MONTH = (() => {
  const arr = [];
  for (let d = 1; d <= 30; d++) {
    const active = d <= 6;            // current calendar month, month-to-date
    const tot = active ? [40, 28, 1.1, 0.7, 33, 144][d - 1] : 0;
    arr.push(pt((d === 1 || d % 5 === 0) ? String(d) : '', `Jun ${d}`, tot));
  }
  return arr;
})();

const PALETTE = ['#27b06e', '#34c27e', '#5fcf9c', '#8fe0b8', '#bdeed3'];
const OVERFLOW_GRAY = '#79817b';

// Week base; per-period views scale these proportionally. Tokens are M.
const MODELS = [
  { name: 'claude-opus-4-8',  vendor: 'Anthropic', tokens: 262.25, cost: 170.30, color: PALETTE[0], priced: true },
  { name: 'glm-5.1',          vendor: 'Z.ai',      tokens: 29.09,  cost: 1.46,   color: PALETTE[1], priced: true },
  { name: 'glm-4.5-air',      vendor: 'Z.ai',      tokens: 8.01,   cost: 0.06,   color: PALETTE[2], priced: true },
  { name: 'deepseek-v4-pro',  vendor: 'DeepSeek',  tokens: 2.63,   cost: 0.09,   color: PALETTE[3], priced: true },
  { name: 'claude-opus-4-7',  vendor: 'Anthropic', tokens: 2.61,   cost: 3.01,   color: PALETTE[4], priced: true },
  { name: 'claude-haiku-4-5', vendor: 'Anthropic', tokens: 0.31,   cost: 0.03,   color: OVERFLOW_GRAY, priced: true },
];
const WEEK_TOTAL = MODELS.reduce((s, m) => s + m.tokens, 0);
const WEEK_COST = MODELS.reduce((s, m) => s + m.cost, 0);

const PERIODS = {
  Day: {
    series: DAY,
    metrics: { totalTokens: 144.72, inputTokens: 1.01, cacheTokens: 143.20, outputTokens: 0.51, cost: 92.25,
      mcpCalls: 2, skillCalls: 2, requests: 623, sessions: 14, deltaTokens: +22, deltaCost: +20, servers: 6, skills: 6 },
    reqTrend: [12, 41, 58, 92, 74, 61, 38, 19], costTrend: [0.4, 1.1, 0.9, 1.6, 1.3, 0.8, 0.5, 0.6],
  },
  Week: {
    series: WEEK,
    metrics: { totalTokens: 304.90, inputTokens: 2.04, cacheTokens: 302.00, outputTokens: 0.86, cost: 174.95,
      mcpCalls: 2, skillCalls: 3, requests: 1655, sessions: 23, deltaTokens: -47, deltaCost: -55, servers: 6, skills: 6 },
    reqTrend: [288, 412, 360, 503, 451, 188, 645], costTrend: [5.2, 7.8, 6.4, 9.1, 8.3, 3.1, 6.2],
  },
  Month: {
    series: MONTH,
    metrics: { totalTokens: 247.90, inputTokens: 1.92, cacheTokens: 245.10, outputTokens: 0.88, cost: 150.40,
      mcpCalls: 2, skillCalls: 2, requests: 1340, sessions: 22, deltaTokens: 0, deltaCost: 0, servers: 6, skills: 6 },
    reqTrend: [1880, 2410, 2050, 3340], costTrend: [22.4, 28.1, 21.6, 29.2],
  },
};

function modelsFor(periodKey) {
  const mm = PERIODS[periodKey].metrics;
  const rt = mm.totalTokens / WEEK_TOTAL, rc = mm.cost / WEEK_COST;
  return MODELS.map(m => ({ ...m, tokens: +(m.tokens * rt).toFixed(2), cost: +(m.cost * rc).toFixed(2) }));
}

const MCP_SERVERS = [
  { name: 'context7', count: 312 }, { name: 'docs-langchain', count: 268 },
  { name: 'filesystem', count: 198 }, { name: 'github', count: 156 },
  { name: 'postgres', count: 142 }, { name: 'fetch', count: 98 },
];
const SKILLS = [
  { name: 'find-skills', count: 92 }, { name: 'skill-creator', count: 78 },
  { name: 'summary-recorder', count: 61 }, { name: 'frontend-design', count: 54 },
  { name: 'excalidraw', count: 38 }, { name: 'vercel-react-best-practices', count: 33 },
];
function callsFor(list, periodTotal) {
  const base = list.reduce((s, x) => s + x.count, 0);
  const r = periodTotal / base;
  return list.map(x => ({ ...x, count: Math.max(1, Math.round(x.count * r)) }))
    .sort((a, b) => b.count - a.count);
}

const YEAR_DAILY = (() => {
  const days = [];
  const today = new Date(2026, 5, 6);
  const start = new Date(today);
  start.setDate(start.getDate() - 25 * 7 - today.getDay());
  for (let i = 0; ; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    if (d > today) break;
    const dow = d.getDay();
    const weekend = dow === 0 || dow === 6;
    const seasonal = 0.55 + 0.45 * Math.sin((i / 182) * Math.PI * 2 + 1);
    const noise = Math.abs(Math.sin(i * 12.9898) * 43758.5453 % 1);
    let v = (weekend ? 0.35 : 1) * seasonal * (0.4 + noise);
    if (noise < 0.12) v = 0;
    const tokens = +(v * 2.4).toFixed(2);
    days.push({ date: new Date(d), tokens });
  }
  const maxV = Math.max(...days.map(x => x.tokens));
  days.forEach(x => {
    const f = x.tokens / maxV;
    x.level = x.tokens === 0 ? 0 : f < 0.25 ? 1 : f < 0.5 ? 2 : f < 0.75 ? 3 : 4;
  });
  return days;
})();

function fmtTokens(m) { if (m >= 1) return m.toFixed(2) + 'M'; return Math.round(m * 1000) + 'K'; }
function fmtInt(n) { return n.toLocaleString('en-US'); }
function pct(part, whole) { return Math.round((part / whole) * 100); }
function fmtMoney(v) {
  if (v >= 100000) return '$' + Math.round(v / 1000) + 'K';
  if (v >= 10000) return '$' + (v / 1000).toFixed(1) + 'K';
  return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtDate(d) { return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }
function linePath(values, w, h, pad = 2) {
  const max = Math.max(...values), min = Math.min(...values);
  const range = max - min || 1;
  const n = values.length;
  const px = (i) => pad + (i / (n - 1)) * (w - pad * 2);
  const py = (v) => pad + (1 - (v - min) / range) * (h - pad * 2);
  const pts = values.map((v, i) => [px(i), py(v)]);
  let d = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[i - 1] || pts[i], p1 = pts[i], p2 = pts[i + 1], p3 = pts[i + 2] || p2;
    const c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;
    const c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;
    d += ` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
  }
  return { d, px, py, pts };
}

const TD = { DAY, WEEK, MONTH, MODELS, PERIODS, modelsFor, MCP_SERVERS, SKILLS, callsFor,
  YEAR_DAILY, fmtDate, fmtTokens, fmtInt, pct, fmtMoney, linePath };

// =====================================================================
// THEMES
// =====================================================================
const TH = {
  dark: {
    ui: "'IBM Plex Sans', system-ui, sans-serif",
    mono: "'IBM Plex Mono', ui-monospace, monospace",
    display: "'Space Grotesk', system-ui, sans-serif",
    accent: '#27b06e', accentSoft: '#5fcf9c',
    text: 'rgba(255,255,255,0.94)', dim: 'rgba(255,255,255,0.52)', faint: 'rgba(255,255,255,0.32)',
    gridLine: 'rgba(255,255,255,0.06)', card: '#1f2226',
    segBg: 'rgba(255,255,255,0.06)', segBorder: 'rgba(255,255,255,0.09)',
    segOnBg: 'rgba(255,255,255,0.15)', segOnText: '#fff', segOffText: 'rgba(255,255,255,0.55)',
    segOnShadow: '0 1px 2px rgba(0,0,0,0.35)', tip: '#34383d',
  },
  light: {
    ui: "'IBM Plex Sans', system-ui, sans-serif",
    mono: "'IBM Plex Mono', ui-monospace, monospace",
    display: "'Space Grotesk', system-ui, sans-serif",
    accent: '#178a55', accentSoft: '#8fd9b4',
    text: 'rgba(17,22,19,0.94)', dim: 'rgba(17,22,19,0.5)', faint: 'rgba(17,22,19,0.32)',
    gridLine: 'rgba(0,0,0,0.06)', card: '#ffffff',
    segBg: 'rgba(0,0,0,0.05)', segBorder: 'rgba(0,0,0,0.07)',
    segOnBg: '#ffffff', segOnText: '#111', segOffText: 'rgba(0,0,0,0.5)',
    segOnShadow: '0 1px 2px rgba(0,0,0,0.12)', tip: '#1d2420',
  },
};

const WALL = {
  dark: 'radial-gradient(120% 80% at 80% 0%, #1c3a30 0%, #15191c 45%, #0e1012 100%)',
  light: 'radial-gradient(120% 80% at 80% 0%, #d6e9df 0%, #eef1ee 45%, #e4e7e4 100%)',
};

// =====================================================================
// CHROME + CHART PRIMITIVES
// =====================================================================
function TokenGlyph({ color = '#1f9d63', size = 14 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 14 14">
      <rect x="0.6" y="0.6" width="12.8" height="12.8" rx="3.2" fill="none" stroke={color} strokeWidth="1.3" />
      <rect x="3" y="7.5" width="1.7" height="3.2" rx="0.6" fill={color} />
      <rect x="6.15" y="5" width="1.7" height="5.7" rx="0.6" fill={color} />
      <rect x="9.3" y="3" width="1.7" height="7.7" rx="0.6" fill={color} />
    </svg>
  );
}

function MenuBar({ theme, dark, highlight = false }) {
  const t = theme;
  const c = dark ? 'rgba(255,255,255,0.92)' : 'rgba(0,0,0,0.82)';
  const dim = dark ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.5)';
  return (
    <div style={{
      height: 26, display: 'flex', alignItems: 'center', gap: 15, padding: '0 11px',
      background: dark ? 'rgba(28,30,32,0.5)' : 'rgba(250,250,250,0.6)',
      borderBottom: `1px solid ${dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)'}`,
      backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)',
    }}>
      <svg width="13" height="13" viewBox="0 0 16 16" style={{ opacity: dark ? 0.92 : 0.78 }}><path fill={c} d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zm0 1.2a5.3 5.3 0 110 10.6A5.3 5.3 0 018 2.7z"/></svg>
      <span style={{ font: `600 12px ${t.ui}`, color: c }}>Finder</span>
      <span style={{ font: `400 12px ${t.ui}`, color: dim }}>File</span>
      <span style={{ font: `400 12px ${t.ui}`, color: dim }}>Edit</span>
      <span style={{ marginLeft: 'auto' }} />
      <div style={{
        display: 'flex', alignItems: 'center', gap: 5, padding: '2px 6px', borderRadius: 5,
        background: highlight ? (dark ? 'rgba(255,255,255,0.14)' : 'rgba(0,0,0,0.08)') : 'transparent',
      }}>
        <TokenGlyph color={t.accent} size={13} />
        <span style={{ font: `600 11px ${t.mono}`, color: c, letterSpacing: '.01em' }}>144.72M</span>
      </div>
      <span style={{ font: `500 12px ${t.ui}`, color: dim }}>Mon 9:41</span>
    </div>
  );
}

function PanelCaret({ color, left = 18 }) {
  return (
    <div style={{ position: 'absolute', top: -7, left, width: 0, height: 0,
      borderLeft: '8px solid transparent', borderRight: '8px solid transparent',
      borderBottom: `8px solid ${color}`, filter: 'drop-shadow(0 -1px 1px rgba(0,0,0,0.06))' }} />
  );
}

function Desk({ dark, theme, children, caretLeft, caretColor }) {
  return (
    <div style={{ width: '100%', height: '100%', background: WALL[dark ? 'dark' : 'light'], position: 'relative', fontFamily: theme.ui }}>
      <MenuBar theme={theme} dark={dark} highlight />
      <div style={{ position: 'relative', padding: '12px 12px' }}>
        <div style={{ position: 'relative' }}>
          <PanelCaret color={caretColor} left={caretLeft} />
          {children}
        </div>
      </div>
    </div>
  );
}

function Segmented({ value = 'Week', items = ['Day', 'Week', 'Month'], theme, onSelect }) {
  const t = theme;
  return (
    <div style={{ display: 'inline-flex', padding: 2, borderRadius: 7, background: t.segBg, border: `1px solid ${t.segBorder}`, gap: 2 }}>
      {items.map((it) => {
        const on = it === value;
        return (
          <div key={it} onClick={() => onSelect && onSelect(it)} style={{
            font: `600 11px ${t.ui}`, letterSpacing: '.02em', padding: '3px 11px', borderRadius: 5, cursor: 'pointer', userSelect: 'none',
            color: on ? t.segOnText : t.segOffText, background: on ? t.segOnBg : 'transparent',
            boxShadow: on ? t.segOnShadow : 'none', transition: 'color .15s, background .15s',
          }}>{it}</div>
        );
      })}
    </div>
  );
}

function ThemeToggle({ dark, theme, onToggle }) {
  const t = theme;
  return (
    <button onClick={onToggle} aria-label="toggle theme" style={{
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      width: 26, height: 26, borderRadius: 7, cursor: 'pointer', padding: 0,
      background: t.segBg, border: `1px solid ${t.segBorder}`, color: t.dim }}>
      {dark ? (
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={t.dim} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="4.2" />
          <path d="M12 2.5v2.2M12 19.3v2.2M2.5 12h2.2M19.3 12h2.2M5.1 5.1l1.6 1.6M17.3 17.3l1.6 1.6M18.9 5.1l-1.6 1.6M6.7 17.3l-1.6 1.6" />
        </svg>
      ) : (
        <svg width="14" height="14" viewBox="0 0 24 24" fill={t.dim} stroke="none">
          <path d="M21 12.9A9 9 0 1 1 11.1 3a7.2 7.2 0 0 0 9.9 9.9z" />
        </svg>
      )}
    </button>
  );
}

// Stacked token bars with a hover tooltip (like the heatmap). Empty (zero)
// bars have no tooltip and no highlight; the hit area spans the full column.
function BarChart({ data, theme, height = 96, accent, accentSoft, radius = 3 }) {
  const t = theme;
  accent = accent || t.accent; accentSoft = accentSoft || t.accentSoft;
  const max = Math.max(...data.map(d => d.input + d.cache + d.output), 1e-9);
  const n = data.length;
  const gapPct = Math.max(0.8, Math.min(6, 32 / n));
  const effRadius = n > 16 ? 1 : radius;
  const [hi, setHi] = useState(null);
  const [tip, setTip] = useState({ x: 0, y: 0 });
  const wrapRef = useRef(null);
  // absolute, relative to this wrapper — the card's backdrop-filter would make a
  // position:fixed tooltip anchor to the card instead of the viewport. Anchor to
  // the visible bar top (baseline − bar height) so short bars don't overlap the
  // legend above.
  const onBar = (d, e) => {
    const wrap = wrapRef.current.getBoundingClientRect();
    const r = e.currentTarget.getBoundingClientRect();
    const barPx = ((d.input + d.cache + d.output) / max) * height;
    setHi(d); setTip({ x: r.left - wrap.left + r.width / 2, y: r.bottom - barPx - wrap.top });
  };
  return (
    <div ref={wrapRef} style={{ position: 'relative' }}>
      <div style={{ position: 'relative', height, display: 'flex', alignItems: 'flex-end', gap: `${gapPct}%` }}>
        {[0.25, 0.5, 0.75, 1].map((g, i) => (
          <div key={i} style={{ position: 'absolute', left: 0, right: 0, bottom: `${g * 100}%`, borderTop: `1px solid ${t.gridLine}` }} />
        ))}
        {data.map((d, i) => {
          const hO = (d.output / max) * height, hI = ((d.input + d.cache) / max) * height;
          const empty = d.input + d.cache + d.output <= 0;
          const on = hi === d;
          return (
            <div key={i}
              onMouseEnter={empty ? undefined : (e) => onBar(d, e)}
              onMouseLeave={empty ? undefined : () => setHi(null)}
              style={{ flex: 1, alignSelf: 'stretch', display: 'flex', flexDirection: 'column', justifyContent: 'flex-end', position: 'relative', zIndex: 1, cursor: 'default', opacity: hi && !on && !empty ? 0.55 : 1, transition: 'opacity .12s' }}>
              <div style={{ height: hO, background: accentSoft, borderRadius: `${effRadius}px ${effRadius}px 0 0` }} />
              <div style={{ height: hI, background: accent }} />
            </div>
          );
        })}
      </div>
      <div style={{ display: 'flex', gap: `${gapPct}%`, marginTop: 6 }}>
        {data.map((d, i) => (
          <div key={i} style={{ flex: 1, textAlign: 'center', font: `500 9px ${t.mono}`, color: t.dim, letterSpacing: '.03em' }}>{d.label}</div>
        ))}
      </div>
      {hi && (
        <div style={{ position: 'absolute',
          left: tip.x, top: tip.y - 8, transform: 'translate(-50%,-100%)',
          background: t.tip, color: '#fff', borderRadius: 6, padding: '5px 8px',
          font: `500 10px ${t.mono}`, whiteSpace: 'nowrap', pointerEvents: 'none', zIndex: 50,
          boxShadow: '0 4px 14px rgba(0,0,0,0.35)' }}>
          <span style={{ color: accent, fontWeight: 600 }}>
            {(() => { const tot = hi.input + hi.cache + hi.output; return tot === 0 ? 'No tokens' : TD.fmtTokens(tot) + ' tokens'; })()}
          </span>
          <span style={{ opacity: 0.7 }}> · {hi.full}</span>
        </div>
      )}
    </div>
  );
}

// Apple-Stocks style: line + gradient area fading out below the curve.
function Sparkline({ values, theme, width = 80, height = 24, accent, strokeW = 1.6 }) {
  const t = theme; accent = accent || t.accent;
  const gid = useId().replace(/:/g, '');
  const { d, px } = TD.linePath(values, width, height, strokeW + 1);
  const area = `${d} L ${px(values.length - 1).toFixed(1)} ${height} L ${px(0).toFixed(1)} ${height} Z`;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block', overflow: 'visible' }}>
      <defs>
        <linearGradient id={`sl${gid}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={accent} stopOpacity="0.32" />
          <stop offset="100%" stopColor={accent} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#sl${gid})`} stroke="none" />
      <path d={d} fill="none" stroke={accent} strokeWidth={strokeW} strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

function CostDonut({ models, theme, size = 104, thickness = 16 }) {
  const t = theme;
  const [hi, setHi] = useState(-1);
  const total = models.reduce((s, m) => s + m.cost, 0) || 1e-9;
  const cx = size / 2, cy = size / 2;
  const rOut = (size - 2) / 2, rIn = rOut - thickness;
  const gap = 0.045;
  let a = -Math.PI / 2;
  const arc = (a0, a1, rO, rI) => {
    const large = (a1 - a0) > Math.PI ? 1 : 0;
    const x0 = cx + rO * Math.cos(a0), y0 = cy + rO * Math.sin(a0);
    const x1 = cx + rO * Math.cos(a1), y1 = cy + rO * Math.sin(a1);
    const x2 = cx + rI * Math.cos(a1), y2 = cy + rI * Math.sin(a1);
    const x3 = cx + rI * Math.cos(a0), y3 = cy + rI * Math.sin(a0);
    return `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${rO} ${rO} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} L ${x2.toFixed(2)} ${y2.toFixed(2)} A ${rI} ${rI} 0 ${large} 0 ${x3.toFixed(2)} ${y3.toFixed(2)} Z`;
  };
  const wedges = models.map((m, i) => {
    const frac = m.cost / total;
    const a0 = a + gap / 2, a1 = a + frac * 2 * Math.PI - gap / 2;
    a += frac * 2 * Math.PI;
    return { m, i, d: arc(a0, a1, hi === i ? rOut + 2 : rOut, rIn) };
  });
  const cur = hi >= 0 ? models[hi] : null;
  const amount = cur ? cur.cost : total;
  const txt = TD.fmtMoney(amount);
  const avail = (size - 2 - thickness * 2) * 0.98;
  const base = cur ? 15 : 17;
  const fit = Math.min(base, Math.max(10, avail / (txt.length * 0.62)));
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
      <div style={{ position: 'relative', width: size, height: size, flex: '0 0 auto' }}>
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ overflow: 'visible' }}>
          {wedges.map((w) => (
            <path key={w.i} d={w.d} fill={w.m.color}
              opacity={hi === -1 || hi === w.i ? 1 : 0.32}
              onMouseEnter={() => setHi(w.i)} onMouseLeave={() => setHi(-1)}
              style={{ transition: 'opacity .14s', cursor: 'default' }} />
          ))}
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', pointerEvents: 'none' }}>
          <span style={{ font: `600 ${fit.toFixed(1)}px ${t.mono}`, color: cur ? cur.color : t.text, lineHeight: 1, letterSpacing: '-.01em' }}>{txt}</span>
        </div>
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        {models.map((m, i) => (
          <div key={i} onMouseEnter={() => setHi(i)} onMouseLeave={() => setHi(-1)}
            style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '2.5px 0', opacity: hi === -1 || hi === i ? 1 : 0.45, transition: 'opacity .14s', cursor: 'default', userSelect: 'none' }}>
            <span style={{ width: 7, height: 7, borderRadius: 2, background: m.color, flex: '0 0 auto' }} />
            <span style={{ font: `500 10.5px ${t.ui}`, color: t.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', flex: 1, fontWeight: hi === i ? 600 : 500 }}>{m.name.replace('Claude ', '')}</span>
            <span style={{ font: `600 10.5px ${t.mono}`, color: hi === i ? m.color : t.dim, flex: '0 0 auto' }}>{TD.fmtMoney(m.cost)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// Bar length = item's share of the total calls (count / total): light track,
// accent fill — same logic as the Total-tokens bar.
function BarList({ items, theme, accent, limit = 5 }) {
  const t = theme; accent = accent || t.accent;
  const shown = items.slice(0, limit);
  const total = items.reduce((s, i) => s + i.count, 0) || 1;
  const more = items.length - shown.length;
  return (
    <div>
      {shown.map((it, i) => (
        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '3px 0' }}>
          <span style={{ font: `500 10.5px ${t.mono}`, color: t.text, flex: '0 0 134px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{it.name}</span>
          <div style={{ flex: 1, height: 5, borderRadius: 3, background: t.gridLine, overflow: 'hidden' }}>
            <div style={{ width: `${(it.count / total) * 100}%`, height: '100%', background: accent, borderRadius: 3 }} />
          </div>
          <span style={{ font: `600 10.5px ${t.mono}`, color: t.dim, flex: '0 0 auto', minWidth: 30, textAlign: 'right' }}>{TD.fmtInt(it.count)}</span>
        </div>
      ))}
      {more > 0 && <div style={{ font: `500 9.5px ${t.ui}`, color: t.faint, paddingTop: 4 }}>+{more} more</div>}
    </div>
  );
}

function mix(accent, op, base) { return `color-mix(in srgb, ${accent} ${Math.round(op * 100)}%, ${base})`; }

function Heatmap({ days, theme, accent, gap = 2 }) {
  const t = theme; accent = accent || t.accent;
  const [hi, setHi] = useState(null);
  const [tip, setTip] = useState({ x: 0, y: 0 });
  const wrapRef = useRef(null);
  const weeks = [];
  days.forEach((d) => {
    const dow = d.date.getDay();
    if (dow === 0 || weeks.length === 0) weeks.push(new Array(7).fill(null));
    weeks[weeks.length - 1][dow] = d;
  });
  const ramp = (lvl) => { if (lvl === 0) return t.gridLine; const op = [0, 0.28, 0.5, 0.74, 1][lvl]; return mix(accent, op, t.card); };
  const monthLabels = []; const seenM = new Set();
  weeks.forEach((wk, wi) => {
    const present = wk.filter(Boolean);
    if (!present.length) return;
    if (monthLabels.length === 0) { const m = present[0].date.getMonth(); monthLabels.push({ frac: wi / weeks.length, m }); seenM.add(m); return; }
    for (const d of present) { const m = d.date.getMonth(); if (d.date.getDate() <= 7 && !seenM.has(m)) { seenM.add(m); monthLabels.push({ frac: wi / weeks.length, m }); break; } }
  });
  // absolute, relative to the heatmap wrapper — the card's backdrop-filter
  // would make a position:fixed tooltip anchor to the card, not the viewport.
  const onCell = (d, e) => {
    const wrap = wrapRef.current.getBoundingClientRect();
    const r = e.target.getBoundingClientRect();
    setHi(d); setTip({ x: r.left - wrap.left + r.width / 2, y: r.top - wrap.top });
  };
  return (
    <div ref={wrapRef} style={{ position: 'relative' }}>
      <div style={{ position: 'relative', height: 12, marginBottom: 3 }}>
        {monthLabels.map((ml, i) => (
          <span key={i} style={{ position: 'absolute', left: `${ml.frac * 100}%`, font: `500 8.5px ${t.mono}`, color: t.faint }}>{MN[ml.m]}</span>
        ))}
      </div>
      <div style={{ display: 'flex', gap, width: '100%' }}>
        {weeks.map((wk, wi) => (
          <div key={wi} style={{ display: 'flex', flexDirection: 'column', gap, flex: '1 1 0', minWidth: 0 }}>
            {wk.map((d, di) => (
              <div key={di}
                onMouseEnter={d ? (e) => onCell(d, e) : undefined}
                onMouseLeave={() => setHi(null)}
                style={{ width: '100%', aspectRatio: '1 / 1', borderRadius: 2,
                  background: d ? ramp(d.level) : 'transparent' }} />
            ))}
          </div>
        ))}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 5, justifyContent: 'flex-end', marginTop: 8, font: `500 8.5px ${t.mono}`, color: t.faint }}>
        <span>Less</span>
        {[0, 1, 2, 3, 4].map((l) => (<span key={l} style={{ width: 9, height: 9, borderRadius: 2, background: ramp(l) }} />))}
        <span>More</span>
      </div>
      {hi && (
        <div style={{ position: 'absolute',
          left: tip.x, top: tip.y - 8, transform: 'translate(-50%,-100%)',
          background: t.tip, color: '#fff', borderRadius: 6, padding: '5px 8px',
          font: `500 10px ${t.mono}`, whiteSpace: 'nowrap', pointerEvents: 'none', zIndex: 50,
          boxShadow: '0 4px 14px rgba(0,0,0,0.35)' }}>
          <span style={{ color: accent, fontWeight: 600 }}>{hi.tokens === 0 ? 'No calls' : TD.fmtTokens(hi.tokens) + ' tokens'}</span>
          <span style={{ opacity: 0.7 }}> · {TD.fmtDate(hi.date)}</span>
        </div>
      )}
    </div>
  );
}

// =====================================================================
// SHARED PANEL PIECES
// =====================================================================
// Usage/cost going up is "bad" → red; going down is "good" → green.
function Delta({ v, theme }) {
  const up = v >= 0;
  const col = up ? '#e0795f' : theme.accent;
  return (
    <span style={{ font: `600 10px ${theme.mono}`, color: col,
      display: 'inline-flex', alignItems: 'center', gap: 2, padding: '1.5px 5px',
      borderRadius: 5, background: up ? 'rgba(224,121,95,0.16)' : 'rgba(39,176,110,0.14)' }}>
      {up ? '▲' : '▼'}{Math.abs(Math.round(v))}%
    </span>
  );
}

function ModelRow({ m, max, theme, total }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 9, padding: '5px 0' }}>
      <span style={{ width: 7, height: 7, borderRadius: 2, background: m.color, flex: '0 0 auto' }} />
      <div style={{ minWidth: 0, flex: '0 0 118px' }}>
        <div style={{ font: `500 11.5px ${theme.ui}`, color: theme.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{m.name}</div>
      </div>
      <div style={{ flex: 1, height: 5, borderRadius: 3, background: theme.gridLine, overflow: 'hidden' }}>
        <div style={{ width: `${(m.tokens / max) * 100}%`, height: '100%', background: m.color, borderRadius: 3 }} />
      </div>
      <span style={{ font: `500 10.5px ${theme.mono}`, color: theme.dim, flex: '0 0 auto', width: 42, textAlign: 'right' }}>{TD.fmtTokens(m.tokens)}</span>
      <span style={{ font: `600 10.5px ${theme.mono}`, color: theme.text, flex: '0 0 auto', width: 30, textAlign: 'right' }}>{TD.pct(m.tokens, total)}%</span>
    </div>
  );
}

function MiniStat({ label, value, sub, theme, accent, children }) {
  return (
    <div style={{ background: theme.gridLine, borderRadius: 9, padding: '9px 10px', minWidth: 0 }}>
      <div style={{ font: `500 9.5px ${theme.ui}`, color: theme.dim, letterSpacing: '.04em', textTransform: 'uppercase' }}>{label}</div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginTop: 3, gap: 6 }}>
        <span style={{ font: `600 17px ${theme.mono}`, color: accent || theme.text, lineHeight: 1 }}>{value}</span>
        {children}
      </div>
      {sub && <div style={{ font: `500 9px ${theme.mono}`, color: theme.faint, marginTop: 3 }}>{sub}</div>}
    </div>
  );
}

// =====================================================================
// PANEL · NATIVE PRO (matches the live menu-bar popover)
// =====================================================================
function Panel({ dark = true }) {
  const t = TH[dark ? 'dark' : 'light'];
  const [period, setPeriod] = useState('Week');
  const [theme, setTheme] = useState(dark ? 'dark' : 'light');
  const td = TH[theme];
  const P = TD.PERIODS[period];
  const M = P.metrics;
  const models = TD.modelsFor(period);
  const tokenModels = models.filter(m => TD.pct(m.tokens, M.totalTokens || 1) > 0);
  const costModels = models.filter(m => m.cost > 0);
  const maxM = Math.max(...tokenModels.map(m => m.tokens), 1e-9);
  const mcpList = TD.callsFor(TD.MCP_SERVERS, M.mcpCalls > 50 ? M.mcpCalls : 1284);
  const skillList = TD.callsFor(TD.SKILLS, M.skillCalls > 50 ? M.skillCalls : 356);
  const trendSub = { Day: 'today 24h', Week: 'last 7 days', Month: 'this month' }[period];
  const isDark = theme === 'dark';
  const cardBg = isDark ? 'rgba(33,36,40,0.82)' : 'rgba(255,255,255,0.9)';
  const card = (
    <div style={{
      width: '100%', borderRadius: 15, background: cardBg,
      border: `1px solid ${isDark ? 'rgba(255,255,255,0.09)' : 'rgba(0,0,0,0.07)'}`,
      backdropFilter: 'blur(24px)', WebkitBackdropFilter: 'blur(24px)',
      boxShadow: isDark ? '0 18px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06)' : '0 18px 50px rgba(40,60,50,0.18), inset 0 1px 0 rgba(255,255,255,0.7)',
      padding: 15, color: td.text,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <TokenGlyph color={td.accent} size={16} />
          <span style={{ font: `600 13px ${td.ui}`, color: td.text, letterSpacing: '.01em' }}>Tokenscope</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <Segmented value={period} theme={td} onSelect={setPeriod} />
          <ThemeToggle dark={isDark} theme={td} onToggle={() => setTheme(isDark ? 'light' : 'dark')} />
        </div>
      </div>
      <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 10 }}>
        <div>
          <div style={{ font: `500 10px ${td.ui}`, color: td.dim, letterSpacing: '.04em', textTransform: 'uppercase' }}>Total tokens</div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginTop: 3 }}>
            <span style={{ font: `600 30px ${td.mono}`, color: td.text, letterSpacing: '-.01em' }}>{M.totalTokens.toFixed(2)}<span style={{ font: `500 15px ${td.mono}`, color: td.dim, marginLeft: 2 }}>M</span></span>
            {Math.round(M.deltaTokens) !== 0 && <Delta v={M.deltaTokens} theme={td} />}
          </div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ font: `500 10px ${td.ui}`, color: td.dim }}>Est. cost</div>
          <div style={{ font: `600 18px ${td.mono}`, color: td.accent, marginTop: 2 }}>${M.cost.toFixed(2)}</div>
        </div>
      </div>
      {/* input(+cache) / output split — 2-colour, no gap; cache folds into In */}
      <div style={{ display: 'flex', gap: 0, height: 7, borderRadius: 4, overflow: 'hidden', marginBottom: 5 }}>
        <div style={{ flexGrow: Math.max(M.inputTokens + M.cacheTokens, 1e-6), flexBasis: 0, minWidth: 4, background: td.accent }} />
        <div style={{ flexGrow: Math.max(M.outputTokens, 1e-6), flexBasis: 0, minWidth: 4, background: td.accentSoft }} />
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, font: `500 10px ${td.mono}`, color: td.dim, marginBottom: 14, whiteSpace: 'nowrap' }}>
        <span><span style={{ color: td.accent }}>●</span> Input {(M.inputTokens + M.cacheTokens).toFixed(2)}M</span>
        <span><span style={{ color: td.accentSoft }}>●</span> Output {M.outputTokens.toFixed(2)}M</span>
        <span style={{ color: td.faint }}>{TD.pct(M.cacheTokens, M.totalTokens)}% cached</span>
      </div>
      <BarChart data={P.series} theme={td} height={84} />
      <div style={{ height: 1, background: td.gridLine, margin: '14px 0 10px' }} />
      <div style={{ font: `600 10px ${td.ui}`, color: td.dim, letterSpacing: '.05em', textTransform: 'uppercase', marginBottom: 4 }}>Tokens by model</div>
      {tokenModels.map((m, i) => <ModelRow key={i} m={m} max={maxM} theme={td} total={M.totalTokens} />)}
      <div style={{ height: 1, background: td.gridLine, margin: '10px 0 10px' }} />
      <div style={{ font: `600 10px ${td.ui}`, color: td.dim, letterSpacing: '.05em', textTransform: 'uppercase', marginBottom: 8 }}>Cost by model</div>
      <CostDonut models={costModels} theme={td} size={100} thickness={15} />
      <div style={{ height: 1, background: td.gridLine, margin: '12px 0 12px' }} />
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
        <MiniStat label="Requests" value={TD.fmtInt(M.requests)} sub={`${M.sessions} sessions`} theme={td}>
          <Sparkline values={P.reqTrend} theme={td} width={52} height={20} accent={td.accent} />
        </MiniStat>
        <MiniStat label="Cost trend" value={`$${M.cost.toFixed(2)}`} sub={trendSub} theme={td} accent={td.accent}>
          <Sparkline values={P.costTrend} theme={td} width={52} height={20} accent={td.accent} />
        </MiniStat>
      </div>
      <div style={{ height: 1, background: td.gridLine, margin: '12px 0 10px' }} />
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 7 }}>
        <span style={{ font: `600 10px ${td.ui}`, color: td.dim, letterSpacing: '.05em', textTransform: 'uppercase', whiteSpace: 'nowrap' }}>MCP calls</span>
        <span style={{ font: `500 10px ${td.mono}`, color: td.faint, whiteSpace: 'nowrap' }}><span style={{ color: td.text, fontWeight: 600 }}>{TD.fmtInt(mcpList.reduce((s, x) => s + x.count, 0))}</span> · {M.servers} servers</span>
      </div>
      <BarList items={mcpList} theme={td} accent={td.accent} />
      <div style={{ height: 1, background: td.gridLine, margin: '12px 0 10px' }} />
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 7 }}>
        <span style={{ font: `600 10px ${td.ui}`, color: td.dim, letterSpacing: '.05em', textTransform: 'uppercase', whiteSpace: 'nowrap' }}>Skill calls</span>
        <span style={{ font: `500 10px ${td.mono}`, color: td.faint, whiteSpace: 'nowrap' }}><span style={{ color: td.text, fontWeight: 600 }}>{TD.fmtInt(skillList.reduce((s, x) => s + x.count, 0))}</span> · {M.skills} skills</span>
      </div>
      <BarList items={skillList} theme={td} accent={td.accent} />
      <div style={{ height: 1, background: td.gridLine, margin: '12px 0 10px' }} />
      <div style={{ marginBottom: 9 }}>
        <span style={{ font: `600 10px ${td.ui}`, color: td.dim, letterSpacing: '.05em', textTransform: 'uppercase', whiteSpace: 'nowrap' }}>Daily activity</span>
      </div>
      <Heatmap days={TD.YEAR_DAILY} theme={td} accent={td.accent} />
      <div style={{ marginTop: 12, font: `500 8.5px ${td.mono}`, color: td.faint, textAlign: 'center' }}>
        Est. cost via models.dev / LiteLLM · estimate
      </div>
    </div>
  );
  return <Desk dark={isDark} theme={td} caretLeft={232} caretColor={cardBg}>{card}</Desk>;
}

// =====================================================================
// STAGE — dark + light side by side
// =====================================================================
function App() {
  return (
    <div className="stage">
      <div className="col">
        <div className="board-label">Native Pro · Dark</div>
        <div className="board"><Panel dark /></div>
      </div>
      <div className="col">
        <div className="board-label">Native Pro · Light (follows system)</div>
        <div className="board"><Panel dark={false} /></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
